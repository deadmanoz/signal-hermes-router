router:
  signal:
    base_url: "http://127.0.0.1:8080"
  state_db: "./private/state/router.db"
  media_root: "./private/media"
  signal_attachment_root: "~/.local/share/signal-cli/attachments"
  max_attachment_bytes: 26214400
  max_signal_event_bytes: 52428800
  max_acp_line_bytes: 8388608
  max_reply_chars: 12000
  max_signal_message_bytes: 1900
  work_root: "./private/work"
  maintenance_reply: "This route is temporarily under maintenance."
  failure_reply: "I hit an internal router error handling that message."
  model_failure_reply: "The model service is temporarily unavailable, so I could not finish that request. Please try again later."
  busy_notice_after_seconds: 120
  busy_notice: "Still working on this."
  # Minimum seconds between busy notices per route. 0 disables the cooldown:
  # every slow turn sends its own notice.
  busy_notice_cooldown_seconds: 0
  acp_prompt_timeout_seconds: 300
  acp_initialize_timeout_seconds: 30
  circuit_breaker:
    failures: 3
    window_seconds: 300
    recovery_seconds: 300
  retention:
    # One sweep at startup, then one per interval.
    sweep_interval_seconds: 21600
    # Prune 'handled' dedupe rows whose last update is older than this.
    # Must be >= 86400 (windows below one day are rejected) so retention
    # comfortably exceeds the Signal redelivery / synthetic retry window.
    # null disables dedupe pruning. Default: 2592000 (30 days).
    dedupe_handled_seconds: 2592000
    # Age bound for router-archived attachments (deleting stored media is
    # data loss, so this is opt-in). Must be >= 86400 when set; null (the
    # default) disables the media age pass.
    media_max_age_seconds: null
    # Optional size cap for the archived-media subtree; oldest attachment
    # groups are removed first until at or under the cap. null (the
    # default) disables the size pass.
    media_max_total_bytes: null
  control:
    enabled: false
    # Defaults to ./private/work/control.sock when enabled.
    socket_path: "./private/work/control.sock"
    # 0 means synthetic control commands return busy immediately if the route is in flight.
    route_lock_timeout_seconds: 0
    # Compact JSON bytes for notify-route payloads after canonicalization.
    max_notification_payload_bytes: 16384
