name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Check out release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up uv
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Strip changelog commit links and refresh uv.lock
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          perl -0pi -e 's/ \(\[[0-9a-f]{7,40}\]\(https:\/\/github\.com\/[^)]+\/commit\/[0-9a-f]{40}\)\)//g' CHANGELOG.md
          uv lock
          if git diff --quiet -- CHANGELOG.md uv.lock; then
            echo "changelog and uv.lock already match release metadata"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md uv.lock
            git commit -m "chore(release): normalize changelog and uv.lock"
            git push
          fi

      # Arm auto-merge on the release PR from within this job, AFTER the normalize
      # commit has been pushed, so the PR can never be squash-merged on a
      # pre-normalize head. This owns the release-PR path that the Auto Merge
      # workflow used to handle; Auto Merge now covers Dependabot only.
      #
      # Resolve the PR number once via jq on the raw `prs` string rather than
      # `fromJSON(...)` in a step `env:`. A step `env:` expression is evaluated
      # even when the step is skipped by `if:`, so `fromJSON` of the empty `prs`
      # output (every push that creates no release PR) would fail the whole job.
      - name: Resolve release PR number
        id: release_pr
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          number="$(printf '%s' "$PRS_JSON" | jq -r '.[0].number')"
          if [ -z "$number" ] || [ "$number" = "null" ]; then
            echo "could not resolve release PR number from release output" >&2
            exit 1
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Resolve release PR merge state
        id: merge_state
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          state=""
          for attempt in 1 2 3 4 5; do
            state="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus)"
            if [ "$state" != "UNKNOWN" ]; then
              break
            fi
            echo "mergeStateStatus is UNKNOWN on attempt $attempt; retrying"
            sleep 5
          done
          echo "merge_state=$state" >> "$GITHUB_OUTPUT"

      - name: Update stale release branch
        id: update_branch
        if: ${{ steps.release.outputs.prs_created == 'true' && steps.merge_state.outputs.merge_state == 'BEHIND' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: gh pr update-branch "$PR_NUMBER" --repo "$REPO"

      - name: Approve release PR
        if: >-
          ${{
            steps.release.outputs.prs_created == 'true' &&
            steps.merge_state.outputs.merge_state != 'DIRTY' &&
            steps.update_branch.outcome != 'failure'
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "Automated approval for normalized release PR."

      - name: Enable squash auto-merge
        if: >-
          ${{
            steps.release.outputs.prs_created == 'true' &&
            steps.merge_state.outputs.merge_state != 'DIRTY' &&
            steps.update_branch.outcome != 'failure'
          }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch
