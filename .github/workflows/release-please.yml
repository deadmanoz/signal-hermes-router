name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Check out release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up uv
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Strip changelog commit links and refresh uv.lock
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          perl -0pi -e 's/ \(\[[0-9a-f]{7,40}\]\(https:\/\/github\.com\/[^)]+\/commit\/[0-9a-f]{40}\)\)//g' CHANGELOG.md
          uv lock
          if git diff --quiet -- CHANGELOG.md uv.lock; then
            echo "changelog and uv.lock already match release metadata"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md uv.lock
          git commit -m "chore(release): normalize changelog and uv.lock"
          git push
