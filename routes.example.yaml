routes:
  - platform: "signal"
    name: "example-route"
    group_id: "SIGNAL_GROUP_ID_BASE64_EXAMPLE"
    friendly_name: "example-signal-group"
    profile: "example-hermes-profile"
    session_policy: "persistent_route"
    # Opt-in recovery for persistent routes. When true, a raised session/resume
    # error after a Hermes subprocess restart discards the stale cached session
    # and creates a fresh one instead of surfacing the resume failure.
    recreate_session_on_resume_failure: false
    # Opt-in session rotation for persistent routes (rejected on ephemeral
    # routes, where every turn already gets a fresh session). A cached session
    # that has served session_max_turns turns, or is older than
    # session_max_age_seconds, is dropped and the next turn starts a fresh
    # session (session/new) on the same running Hermes subprocess, bounding
    # accumulated conversation context on busy routes. Unset means never
    # rotate. A resumed session keeps its rotation budget; a recreated one
    # starts a new budget.
    # session_max_turns: 50
    # session_max_age_seconds: 86400
    state: "shadow"
    # Opt-in inbound burst policy for busy many-participant groups. Both knobs
    # are off by default.
    #
    # Skip (dedupe-claim + mark handled, never prompt) routed events whose
    # Signal timestamp is older than this many seconds when the turn would
    # run, so a backlog drain does not answer hours-old messages. Redelivery
    # of a skipped event stays skipped.
    # max_event_age_seconds: 900
    #
    # Token-bucket cap on prompted inbound turns: sustained rate of max_turns
    # per window_seconds, with bursts up to max_turns. Turns beyond the rate
    # are dropped (dedupe-claimed + marked handled) with a content-free log
    # line.
    # inbound_rate_limit:
    #   max_turns: 10
    #   window_seconds: 60
    route_context:
      purpose: "Synthetic public example route."
      route_alias: "example"
      # Opt-in (off by default). When set to an explicit boolean true, prompt
      # attachment manifests expose the router-managed stored path as `tool_path`
      # so the profile's tools can operate on the exact stored file. Router-consumed
      # only; never serialised into the prompt preamble.
      # attachment_tool_paths: true
    permissions:
      - tool: "read_file"
        arguments:
          path:
            prefix: "/private/deployment/read-only/"
    # Opt-in (default false). When true, preflight reports local_tool_exposed
    # issues for any local terminal/fs tool found either in the profile's
    # full_callable surface or in the route's (and its scheduled jobs' and
    # notifications') permission allowlist. The router also defense-in-depth
    # rejects session/request_permission for those tools at runtime, but the
    # primary gate is the preflight check.
    # mcp_only: true

  # Direct-message routes are opt-in and exact-sender only. Keep real sender
  # UUIDs/numbers in a private deployment repo and load them through secret refs.
  # - platform: "signal"
  #   name: "synthetic-direct-route"
  #   chat_type: "direct"
  #   sender_id: "env://SIGNAL_DIRECT_SENDER_UUID"
  #   sender_number: "env://SIGNAL_DIRECT_SENDER_NUMBER"
  #   friendly_name: "synthetic-direct-example"
  #   profile: "example-hermes-profile"
  #   session_policy: "persistent_sender"
  #   state: "shadow"
  #   route_context:
  #     purpose: "Synthetic public direct-message example route."
  #     route_alias: "direct-example"
  #   permissions: []

scheduled_jobs: []
notifications: []

